<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Dashboard Cards Wireframe -->
  <g id="dashboard-cards">
    <text x="20" y="30" font-size="18" font-weight="bold">Dashboard Cards</text>
    
    <!-- Card 1: Total Siswa -->
    <rect x="20" y="50" width="250" height="120" fill="#EEF2FF" stroke="#1E3A8A" stroke-width="2" rx="12"/>
    <text x="40" y="90" font-size="48">👥</text>
    <text x="120" y="100" font-size="32" font-weight="bold" fill="#1E3A8A">150</text>
    <text x="120" y="125" font-size="14" fill="#6B7280">Total Siswa</text>
    
    <!-- Card 2: Pembayaran Hari Ini -->
    <rect x="290" y="50" width="250" height="120" fill="#D1FAE5" stroke="#10B981" stroke-width="2" rx="12"/>
    <text x="310" y="90" font-size="48">💰</text>
    <text x="380" y="100" font-size="24" font-weight="bold" fill="#10B981">Rp 3.000.000</text>
    <text x="380" y="125" font-size="14" fill="#6B7280">Pembayaran Hari Ini</text>
    
    <!-- Card 3: Pembayaran Bulan Ini -->
    <rect x="560" y="50" width="250" height="120" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" rx="12"/>
    <text x="580" y="90" font-size="48">📊</text>
    <text x="650" y="100" font-size="24" font-weight="bold" fill="#F59E0B">Rp 45M</text>
    <text x="650" y="125" font-size="14" fill="#6B7280">Pembayaran Bulan Ini</text>
  </g>
  
  <!-- Payment Form Layout -->
  <g id="payment-form" transform="translate(0, 220)">
    <text x="20" y="30" font-size="18" font-weight="bold">Payment Form Layout</text>
    
    <!-- Form Container -->
    <rect x="20" y="50" width="500" height="450" fill="white" stroke="#E5E7EB" stroke-width="2" rx="12"/>
    
    <!-- Title -->
    <text x="40" y="85" font-size="20" font-weight="bold">Input Pembayaran SPP</text>
    
    <!-- Search Input -->
    <text x="40" y="115" font-size="12" fill="#6B7280">Cari Siswa (NISN/NIS/Nama)</text>
    <rect x="40" y="120" width="460" height="40" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1" rx="6"/>
    <text x="50" y="145" font-size="14" fill="#9CA3AF">Ketik untuk mencari...</text>
    
    <!-- Info Box -->
    <rect x="40" y="175" width="460" height="100" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1" rx="6"/>
    <text x="50" y="195" font-size="12" font-weight="bold">Informasi Siswa</text>
    <text x="50" y="215" font-size="11">NISN: 0051234567</text>
    <text x="50" y="235" font-size="11">Nama: Ahmad Fauzi</text>
    <text x="50" y="255" font-size="11">Kelas: X RPL 1</text>
    <text x="50" y="270" font-size="11">Tarif SPP: Rp 350.000</text>
    
    <!-- Month Input -->
    <text x="40" y="305" font-size="12" fill="#6B7280">Bulan</text>
    <rect x="40" y="310" width="220" height="40" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1" rx="6"/>
    <text x="50" y="335" font-size="14">Januari ▼</text>
    
    <!-- Year Input -->
    <text x="280" y="305" font-size="12" fill="#6B7280">Tahun</text>
    <rect x="280" y="310" width="220" height="40" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1" rx="6"/>
    <text x="290" y="335" font-size="14">2026</text>
    
    <!-- Amount Input -->
    <text x="40" y="375" font-size="12" fill="#6B7280">Jumlah Bayar</text>
    <rect x="40" y="380" width="460" height="40" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1" rx="6"/>
    <text x="50" y="405" font-size="14">350000</text>
    
    <!-- Buttons -->
    <rect x="40" y="445" width="200" height="40" fill="#1E3A8A" rx="6"/>
    <text x="90" y="470" font-size="14" font-weight="bold" fill="white">PROSES PEMBAYARAN</text>
    
    <rect x="250" y="445" width="100" height="40" fill="#6B7280" rx="6"/>
    <text x="280" y="470" font-size="14" font-weight="bold" fill="white">RESET</text>
  </g>
  
  <!-- Receipt Modal -->
  <g id="receipt-modal" transform="translate(850, 50)">
    <text x="0" y="30" font-size="18" font-weight="bold">Receipt Modal</text>
    
    <!-- Modal Container -->
    <rect x="0" y="50" width="320" height="450" fill="white" stroke="#E5E7EB" stroke-width="2" rx="12"/>
    
    <!-- Header -->
    <text x="80" y="85" font-size="16" font-weight="bold">BUKTI PEMBAYARAN</text>
    <line x1="20" y1="95" x2="300" y2="95" stroke="#1E3A8A" stroke-width="2"/>
    
    <!-- Receipt Details -->
    <text x="20" y="120" font-size="11" fill="#6B7280">No. Transaksi:</text>
    <text x="220" y="120" font-size="11" font-weight="bold">00000123</text>
    
    <text x="20" y="140" font-size="11" fill="#6B7280">Tanggal:</text>
    <text x="220" y="140" font-size="11">25 Jan 2026</text>
    
    <text x="20" y="160" font-size="11" fill="#6B7280">NISN:</text>
    <text x="220" y="160" font-size="11">0051234567</text>
    
    <text x="20" y="180" font-size="11" fill="#6B7280">Nama:</text>
    <text x="220" y="180" font-size="11">Ahmad Fauzi</text>
    
    <text x="20" y="200" font-size="11" fill="#6B7280">Periode:</text>
    <text x="220" y="200" font-size="11">Jan 2026</text>
    
    <!-- Amount Box -->
    <rect x="20" y="220" width="280" height="80" fill="#1E3A8A" rx="6"/>
    <text x="100" y="245" font-size="12" fill="white">Jumlah Dibayar</text>
    <text x="70" y="280" font-size="28" font-weight="bold" fill="white">Rp 350.000</text>
    
    <!-- QR Code Placeholder -->
    <rect x="110" y="320" width="100" height="100" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1"/>
    <text x="135" y="365" font-size="10" fill="#6B7280">QR Code</text>
    <text x="145" y="380" font-size="8" fill="#6B7280">00000123</text>
    
    <!-- Print Button -->
    <rect x="60" y="440" width="200" height="40" fill="#10B981" rx="6"/>
    <text x="120" y="465" font-size="14" font-weight="bold" fill="white">🖨️ CETAK</text>
  </g>
  
  <!-- Annotations -->
  <text x="20" y="750" font-size="12" fill="#6B7280">Wireframe Components: Dashboard Cards, Payment Form, Receipt Modal</text>
  <text x="20" y="770" font-size="12" fill="#6B7280">Design System: Primary #1E3A8A, Success #10B981, Warning #F59E0B</text>
  <text x="20" y="790" font-size="12" fill="#6B7280">Interactions: Autocomplete search, form validation, print receipt</text>
</svg>
